<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3F Astrology AI | Neural Vedic Oracle | ജാതകം</title>
    
    <meta name="description" content="Advanced AI-powered Vedic Astrology in Malayalam.">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Spectral:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c2a35d; --bg: #050508; --card: rgba(20, 20, 25, 0.95); --text: #f5e6c8; --success: #82e0aa; --error: #ff6b6b; }
        
        body { 
            background: radial-gradient(circle at top, #1a1a2e 0%, var(--bg) 100%); 
            color: var(--text); 
            font-family: 'Spectral', serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .nav-bar { margin: 15px 0; z-index: 10; }
        .nav-bar a { color: var(--gold); text-decoration: none; margin: 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Cinzel'; }

        .container { 
            width: 90%; max-width: 480px; margin: 20px auto; padding: 25px; 
            background: var(--card); border: 1px solid rgba(194, 163, 93, 0.2); 
            border-radius: 25px; box-shadow: 0 10px 60px rgba(0,0,0,0.9); 
            text-align: center; animation: fadeIn 1s ease;
        }

        h1 { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 5px; margin-bottom: 5px; font-size: 28px; }
        
        .trust-badge { color: var(--success); font-size: 11px; margin-bottom: 20px; border-bottom: 1px solid rgba(194, 163, 93, 0.1); padding-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 18px; text-align: left; padding: 0 10px; }
        label { display: block; font-size: 11px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }

        input { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(194, 163, 93, 0.3); 
            color: white; padding: 14px; border-radius: 10px; width: 100%; 
            box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s;
        }

        .ritual-btn { 
            background: linear-gradient(45deg, #c2a35d, #8a6d29); color: #000; border: none; 
            padding: 16px; font-family: 'Cinzel', serif; font-weight: bold; border-radius: 50px; 
            cursor: pointer; width: 100%; margin-top: 20px; font-size: 14px; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(194, 163, 93, 0.3); transition: 0.4s;
        }

        #loader { display: none; margin: 40px 0; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .kundli-box { width: 280px; height: 280px; margin: 30px auto; position: relative; display: none; }
        .kundli-svg { width: 100%; height: 100%; stroke: var(--gold); stroke-width: 1.5; fill: none; }
        
        #result-card { display: none; background: rgba(0,0,0,0.6); padding: 25px; border-radius: 15px; margin-top: 25px; text-align: left; border-left: 4px solid var(--gold); font-size: 15px; line-height: 1.8; color: #eee; }

        .payment-box { margin-top: 30px; padding: 25px; border: 1px dashed var(--error); border-radius: 20px; display: none; background: rgba(255,0,0,0.03); }
        .feature-item { font-size: 13px; color: #ccc; margin-bottom: 6px; display: block; }

        #pay-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card); border: 1px solid var(--gold); padding: 30px;
            border-radius: 20px; text-align: center; width: 85%; max-width: 350px;
        }
        .qr-img { width: 180px; height: 180px; margin: 15px 0; border: 5px solid white; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="#">Home</a>
        <a href="#">Horoscope</a>
        <a href="#">Matching</a>
    </nav>

    <div class="container">
        <h1>A3F STELLAR</h1>
        <div class="trust-badge">
            ✔ AI-Powered Vedic Oracle<br>
            ✔ Neural Destiny Synthesis
        </div>

        <div id="setup">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="പേര് നൽകുക">
            </div>
            <div class="input-group">
                <label>Birth Date</label>
                <input type="date" id="dob">
            </div>
            <div class="input-group">
                <label>Birth Time</label>
                <input type="time" id="tob">
            </div>
            <button class="ritual-btn" onclick="initiateOracle()">SYNTHESIZE DESTINY</button>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p id="statusText" style="color: var(--gold); font-size: 14px;">നക്ഷത്രങ്ങൾ ഗണിക്കുന്നു...</p>
        </div>

        <div class="kundli-box" id="chart">
            <svg class="kundli-svg" viewBox="0 0 400 400">
                <path d="M0 0 L400 400 M400 0 L0 400 M200 0 L400 200 L200 400 L0 200 Z" />
                <rect x="0" y="0" width="400" height="400" />
            </svg>
            <div style="position:absolute; top:140px; left:135px; color:var(--gold); font-size:11px; font-family:'Cinzel';">LAGNA</div>
        </div>

        <div id="result-card">
            <h3 style="margin:0 0 12px 0; color:var(--gold); font-family: 'Cinzel'; text-align:center;">DESTINY ANALYSIS</h3>
            <div id="prediction-text"></div>
        </div>

        <div class="payment-box" id="pay-box">
            <p style="font-size:14px; color:var(--gold);">🔒 നിങ്ങളുടെ ജീവിതത്തിലെ രഹസ്യങ്ങൾ പൂർണ്ണമായും അൺലോക്ക് ചെയ്യൂ.</p>
            <button class="ritual-btn" onclick="openPaymentModal()">FULL REPORT (₹50)</button>
        </div>
    </div>

    <div id="pay-modal">
        <div class="modal-content">
            <h3 style="color:var(--gold);">PAY ₹50</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=dream9thbetalian@okicici%26pn=MuhammedAdhinan%26am=50%26cu=INR" class="qr-img">
            <button class="ritual-btn" onclick="payViaApp()">UPI APP വഴി പണമടയ്ക്കുക</button>
            <button class="ritual-btn" style="background: #25D366; margin-top:10px;" onclick="sendToWA()">I PAID, GET REPORT</button>
            <p onclick="document.getElementById('pay-modal').style.display='none'" style="cursor:pointer; margin-top:15px; font-size:12px;">← മടങ്ങുക</p>
        </div>
    </div>

    <script>
        // പൈത്തൺ ബാക്കെൻഡ് ഇല്ലാതെ നേരിട്ട് Groq ഉപയോഗിക്കുന്ന രീതി
        // ⚠️ ശ്രദ്ധിക്കുക: ഈ കീ മറ്റാർക്കും കൈമാറരുത്.
        const GROQ_API_KEY = "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; 

        async function initiateOracle() {
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;
            const tob = document.getElementById('tob').value;

            if (!name || !dob || !tob) return alert("ദയവായി എല്ലാ വിവരങ്ങളും നൽകുക.");

            document.getElementById('setup').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            const statusText = document.getElementById('statusText');
            setTimeout(() => { statusText.innerText = "ഗ്രഹങ്ങളുടെ നില പരിശോധിക്കുന്നു..."; }, 1500);

            try {
                const prompt = `You are an expert Vedic Astrologer. User Details: Name: ${name}, Date: ${dob}, Time: ${tob}. 
                                Provide a professional, mystical Jathakam report in Malayalam. 
                                Include: 1. Star & Rashi, 2. Character, 3. Career in 2026, 4. A secret advice. 
                                Use bullet points. Use rich Malayalam language.`;

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const aiReport = data.choices[0].message.content;
                renderResults(aiReport);

            } catch (err) {
                console.error(err);
                alert("API Error! കീ ശരിയാണോ എന്ന് പരിശോധിക്കുക.");
                location.reload();
            }
        }

        function renderResults(report) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('chart').style.display = 'block';
            document.getElementById('result-card').style.display = 'block';
            document.getElementById('pay-box').style.display = 'block';

            // ബുള്ളറ്റ് പോയിന്റുകളും ലൈൻ ബ്രേക്കുകളും ശരിയാക്കുന്നു
            const formatted = report.replace(/\n/g, '<br>');
            document.getElementById('prediction-text').innerHTML = formatted;
        }

        function openPaymentModal() { document.getElementById('pay-modal').style.display = 'flex'; }

        function payViaApp() {
            const upiUrl = `upi://pay?pa=dream9thbetalian@okicici&pn=MuhammedAdhinan&am=50&cu=INR`;
            window.location.href = upiUrl;
        }

        function sendToWA() {
            const name = document.getElementById('name').value;
            const msg = `🔮 A3F STELLAR: ഞാൻ ₹50 അടച്ചു. പേര്: ${name}. ഫുൾ റിപ്പോർട്ട് അയക്കൂ.`;
            window.location.href = `https://wa.me/916235026761?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
